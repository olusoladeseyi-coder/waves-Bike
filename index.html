<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KpaKpa — Bike there. Bargain first.</title>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap');

  :root{
    --asphalt:#14181D;
    --asphalt-2:#1E252D;
    --asphalt-3:#262E37;
    --hazard:#F5C400;
    --ember:#E85D2C;
    --paper:#EDE6D6;
    --ink:#FAFAF7;
    --graphite:#8A929C;
    --graphite-dark:#3B434D;
    --good:#4CAF7D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #1c232b 0%, transparent 40%),
      var(--asphalt);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 12px;
  }
  .phone{
    width:100%;
    max-width:400px;
    background:var(--asphalt-2);
    border:6px solid #0A0D10;
    border-radius:34px;
    box-shadow:0 30px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
    overflow:hidden;
    position:relative;
  }
  .hazard-strip{
    height:9px;
    background:repeating-linear-gradient(135deg, var(--hazard) 0 12px, var(--asphalt) 12px 24px);
    flex-shrink:0;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px 10px;
  }
  .brand{
    font-family:'Archivo Black',sans-serif;
    font-size:20px;
    letter-spacing:0.5px;
    color:var(--ink);
  }
  .brand span{color:var(--hazard);}
  .tagline{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--graphite);
    letter-spacing:0.5px;
    margin-top:-2px;
  }
  .reset-btn{
    background:none;
    border:1px solid var(--graphite-dark);
    color:var(--graphite);
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    padding:6px 10px;
    border-radius:20px;
    cursor:pointer;
  }
  .reset-btn:hover{border-color:var(--hazard); color:var(--hazard);}
  #app{
    padding:16px 18px 26px;
    min-height:600px;
  }
  h1.screen-title{
    font-family:'Archivo Black',sans-serif;
    font-size:22px;
    margin:6px 0 4px;
    line-height:1.15;
  }
  p.sub{
    color:var(--graphite);
    font-size:13px;
    margin:0 0 18px;
    line-height:1.5;
  }
  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color:var(--graphite);
    margin:14px 0 6px;
  }
  input[type=text], input[type=number], input[type=email]{
    width:100%;
    background:var(--asphalt-3);
    border:1px solid var(--graphite-dark);
    border-radius:8px;
    padding:12px 12px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
  }
  input:focus{outline:2px solid var(--hazard); border-color:var(--hazard);}
  .fare-input-wrap{position:relative;}
  .fare-input-wrap input{padding-left:30px; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:16px;}
  .fare-prefix{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--hazard); font-family:'IBM Plex Mono',monospace; font-weight:600;}

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    padding:14px 16px;
    margin-top:16px;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    cursor:pointer;
    border:none;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  }
  .btn-primary{background:var(--hazard); color:var(--asphalt);}
  .btn-primary:hover{background:#ffd633;}
  .btn-ghost{background:var(--asphalt-3); color:var(--ink); border:1px solid var(--graphite-dark); clip-path:none; border-radius:8px;}
  .btn-ghost:hover{border-color:var(--hazard); color:var(--hazard);}
  .btn-ember{background:var(--ember); color:var(--ink);}
  .btn-small{width:auto; padding:9px 14px; margin-top:0; font-size:11px;}
  .btn-row{display:flex; gap:8px; margin-top:10px;}
  .btn-row .btn{margin-top:0;}

  .role-grid{display:flex; flex-direction:column; gap:14px; margin-top:22px;}
  .role-card{
    background:var(--asphalt-3);
    border:1px solid var(--graphite-dark);
    border-radius:14px;
    padding:20px;
    cursor:pointer;
    transition:border-color .15s;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .role-card:hover{border-color:var(--hazard);}
  .role-icon{
    width:46px;height:46px;border-radius:10px;
    background:var(--asphalt);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    flex-shrink:0;
    border:1px solid var(--graphite-dark);
  }
  .role-card h3{margin:0 0 3px; font-family:'Archivo Black',sans-serif; font-size:15px;}
  .role-card p{margin:0; font-size:12px; color:var(--graphite);}

  .card{
    background:var(--asphalt-3);
    border:1px solid var(--graphite-dark);
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
  }
  .biker-row{display:flex; align-items:center; gap:12px;}
  .avatar{
    width:42px;height:42px;border-radius:50%;
    background:var(--asphalt);
    border:2px solid var(--hazard);
    display:flex;align-items:center;justify-content:center;
    font-family:'Archivo Black',sans-serif;
    font-size:14px;
    color:var(--hazard);
    flex-shrink:0;
  }
  .biker-name{font-weight:600; font-size:14px;}
  .biker-meta{font-size:11px; color:var(--graphite); font-family:'IBM Plex Mono',monospace; margin-top:2px;}
  .offer-price{
    margin-left:auto;
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:16px;
    color:var(--hazard);
    text-align:right;
  }
  .offer-status{font-size:10px; color:var(--graphite); text-transform:uppercase; text-align:right; margin-top:2px;}

  .spinner-wrap{display:flex; flex-direction:column; align-items:center; padding:40px 10px;}
  .spinner{
    width:52px;height:52px;border-radius:50%;
    border:4px solid var(--asphalt-3);
    border-top-color:var(--hazard);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--good); display:inline-block; margin-right:6px; animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .progress-track{height:8px; border-radius:4px; background:var(--asphalt-3); overflow:hidden; margin:18px 0 8px;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--hazard), var(--ember)); width:0%; transition:width .3s linear;}

  .receipt{
    background:var(--paper);
    color:var(--asphalt);
    border-radius:6px;
    padding:18px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
  }
  .receipt-row{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #c9c2ae;}
  .receipt-row.total{border-bottom:none; font-weight:700; font-size:15px; margin-top:4px;}
  .receipt-title{font-family:'Archivo Black',sans-serif; font-size:16px; margin-bottom:10px;}

  .toggle-row{display:flex; align-items:center; justify-content:space-between; background:var(--asphalt-3); border:1px solid var(--graphite-dark); border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .switch{width:46px;height:26px;border-radius:20px;background:var(--graphite-dark); position:relative; cursor:pointer; transition:background .2s;}
  .switch.on{background:var(--good);}
  .switch .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;}
  .switch.on .knob{left:23px;}

  .banner-note{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--graphite);
    background:var(--asphalt-3);
    border:1px dashed var(--graphite-dark);
    border-radius:8px;
    padding:10px 12px;
    margin-top:16px;
    line-height:1.5;
  }
  .wallet-balance{
    font-family:'Archivo Black',sans-serif;
    font-size:34px;
    color:var(--hazard);
    margin:4px 0 0;
  }
  .empty-state{text-align:center; padding:40px 10px; color:var(--graphite); font-size:13px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="hazard-strip"></div>
    <div class="topbar">
      <div>
        <div class="brand">KPA<span>KPA</span></div>
        <div class="tagline">BIKE THERE. BARGAIN FIRST.</div>
      </div>
      <button class="reset-btn" data-action="reset">↻ RESET</button>
    </div>
    <div id="app"></div>
    <div class="hazard-strip"></div>
  </div>

<script>
/* ---------------------------------------------------------
   KpaKpa — bike-taxi prototype with fare negotiation
   Payments: Paystack Inline (client-side, public key only)
--------------------------------------------------------- */

// !!! REPLACE WITH YOUR OWN PAYSTACK PUBLIC KEY (from dashboard.paystack.com) !!!
const PAYSTACK_PUBLIC_KEY = "pk_test_REPLACE_WITH_YOUR_PAYSTACK_PUBLIC_KEY";

// Where the KpaKpa backend (server.js) is running — see /backend in the project files.
const BACKEND_URL = "http://localhost:4000";

const RIDER_NAMES = ["Amaka Obi","Kelechi Nwosu","Fatima Bello","David Okon"];
const BIKER_POOL = [
  {name:"Tunde Balogun", bike:"Bajaj Boxer", rating:4.8, initial:"T"},
  {name:"Ifeoma Okoye", bike:"TVS Star", rating:4.9, initial:"I"},
  {name:"Bashir Mohammed", bike:"Suzuki Haojue", rating:4.6, initial:"B"},
];

let S = initialState();
function initialState(){
  return {
    screen:"role",
    role:null,
    // rider state
    pickup:"Wuse 2, Abuja",
    dropoff:"Garki, Abuja",
    distanceKm:null,
    suggestedFare:null,
    riderOffer:null,
    responses:[],       // [{...biker, price, status:'pending'|'countered'|'accepted'}]
    matchedBiker:null,
    finalFare:null,
    rideProgress:0,
    riderEmail:"rider@example.com",
    // biker state
    online:false,
    incomingRequest:null,
    bikerNegotiation:null, // {riderName, distanceKm, pickup, dropoff, price, status}
    activeRide:null,
    wallet:0,
    tripsToday:0,
    // withdraw flow
    banks:[],
    banksLoading:false,
    resolving:false,
    resolvedAccountName:null,
    resolveError:null,
    withdrawStatus:null,   // null | 'processing' | 'success' | 'error'
    withdrawMessage:null,
  };
}

const app = document.getElementById("app");

function render(){
  app.innerHTML = SCREENS[S.screen]();
}

app.addEventListener("click", e=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  handleAction(el.dataset.action, el.dataset);
});
document.querySelector(".reset-btn").addEventListener("click", ()=>{ S = initialState(); render(); });

function fmt(n){ return "₦" + Number(n).toLocaleString(); }
function rand(min,max){ return Math.random()*(max-min)+min; }

/* ---------------- ACTION HANDLER ---------------- */
function handleAction(action, data){
  switch(action){

    case "choose-role":
      S.role = data.role;
      S.screen = data.role === "rider" ? "rider-setup" : "biker-home";
      render();
      break;

    case "find-bike": {
      const pickup = document.getElementById("in-pickup").value || S.pickup;
      const dropoff = document.getElementById("in-dropoff").value || S.dropoff;
      const offer = Number(document.getElementById("in-offer").value) || S.suggestedFare;
      S.pickup = pickup; S.dropoff = dropoff; S.riderOffer = offer;
      S.screen = "rider-searching";
      render();
      setTimeout(()=>{
        S.responses = BIKER_POOL.map(b=>{
          const willAccept = S.riderOffer >= S.suggestedFare * (0.8 + Math.random()*0.15);
          const counter = willAccept ? S.riderOffer : Math.round((S.riderOffer + rand(150,500))/10)*10;
          return {...b, price: counter, status: willAccept ? "accepted" : "countered"};
        });
        S.screen = "rider-negotiating";
        render();
      }, 1600);
      break;
    }

    case "accept-biker": {
      const biker = S.responses.find(r=>r.name===data.name);
      S.matchedBiker = biker;
      S.finalFare = biker.price;
      S.screen = "rider-matched";
      render();
      break;
    }

    case "counter-biker": {
      const input = document.getElementById("counter-"+cssSafe(data.name));
      const newOffer = Number(input.value);
      const biker = S.responses.find(r=>r.name===data.name);
      const willAccept = newOffer >= biker.price * 0.9;
      biker.price = willAccept ? newOffer : Math.round((newOffer + rand(50,200))/10)*10;
      biker.status = willAccept ? "accepted" : "countered";
      render();
      break;
    }

    case "start-ride":
      S.screen = "rider-riding";
      S.rideProgress = 0;
      render();
      const iv = setInterval(()=>{
        S.rideProgress += 8 + Math.random()*10;
        if(S.rideProgress >= 100){
          S.rideProgress = 100;
          clearInterval(iv);
          S.screen = "rider-completed";
        }
        render();
      }, 350);
      break;

    case "pay-fare":
      payWithPaystack();
      break;

    case "back-to-role":
      S = initialState();
      render();
      break;

    /* ---------------- BIKER SIDE ---------------- */

    case "toggle-online":
      S.online = !S.online;
      render();
      if(S.online){
        setTimeout(()=>{
          if(!S.online) return;
          const rider = RIDER_NAMES[Math.floor(Math.random()*RIDER_NAMES.length)];
          const distanceKm = +(rand(2,9)).toFixed(1);
          const price = Math.round((distanceKm*160*rand(0.8,1.1))/10)*10;
          S.incomingRequest = {
            riderName: rider,
            pickup: "Wuse 2, Abuja",
            dropoff: "Garki, Abuja",
            distanceKm, price, status:"pending"
          };
          render();
        }, 1800);
      }
      break;

    case "accept-request":
      S.activeRide = {...S.incomingRequest, finalFare: S.incomingRequest.price};
      S.incomingRequest = null;
      S.screen = "biker-active";
      render();
      break;

    case "counter-request": {
      const input = document.getElementById("biker-counter-input");
      const newPrice = Number(input.value);
      S.incomingRequest.status = "waiting";
      render();
      setTimeout(()=>{
        const riderAccepts = Math.random() > 0.35;
        if(riderAccepts){
          S.activeRide = {...S.incomingRequest, finalFare:newPrice};
          S.incomingRequest = null;
          S.screen = "biker-active";
        } else {
          S.incomingRequest.price = Math.round((newPrice*0.9)/10)*10;
          S.incomingRequest.status = "pending";
        }
        render();
      }, 1400);
      break;
    }

    case "decline-request":
      S.incomingRequest = null;
      render();
      break;

    case "complete-delivery":
      S.wallet += S.activeRide.finalFare;
      S.tripsToday += 1;
      S.activeRide = null;
      S.screen = "biker-home";
      render();
      break;

    case "withdraw":
      S.screen = "biker-withdraw";
      S.resolvedAccountName = null;
      S.resolveError = null;
      S.withdrawStatus = null;
      render();
      loadBanks();
      break;

    case "resolve-account":
      resolveAccount();
      break;

    case "submit-withdraw":
      submitWithdraw();
      break;
  }
}

/* ---------------- BACKEND-CONNECTED PAYOUT FLOW ---------------- */
async function loadBanks(){
  S.banksLoading = true; render();
  try{
    const r = await fetch(BACKEND_URL + "/api/banks");
    const data = await r.json();
    S.banks = data.banks || [];
  }catch(e){
    S.banks = [];
  }
  S.banksLoading = false;
  render();
}

async function resolveAccount(){
  const accInput = document.getElementById("wd-account");
  const bankSelect = document.getElementById("wd-bank");
  const account_number = accInput.value.trim();
  const bank_code = bankSelect.value;
  if(!account_number || !bank_code){
    S.resolveError = "Enter an account number and choose a bank.";
    render();
    return;
  }
  S.resolving = true; S.resolveError = null; S.resolvedAccountName = null; render();
  try{
    const r = await fetch(BACKEND_URL + "/api/banks/resolve", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({account_number, bank_code})
    });
    const data = await r.json();
    if(data.status){
      S.resolvedAccountName = data.account_name;
    } else {
      S.resolveError = data.message || "Could not resolve that account.";
    }
  }catch(e){
    S.resolveError = "Could not reach the backend at " + BACKEND_URL + ". Is it running?";
  }
  S.resolving = false;
  render();
}

async function submitWithdraw(){
  if(!S.resolvedAccountName){
    S.withdrawStatus = "error";
    S.withdrawMessage = "Resolve the account name first.";
    render();
    return;
  }
  const account_number = document.getElementById("wd-account").value.trim();
  const bank_code = document.getElementById("wd-bank").value;
  S.withdrawStatus = "processing"; render();
  try{
    const r = await fetch(BACKEND_URL + "/api/withdraw", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        account_number, bank_code,
        account_name: S.resolvedAccountName,
        amount: S.wallet
      })
    });
    const data = await r.json();
    if(data.status){
      S.withdrawStatus = "success";
      S.wallet = 0;
    } else {
      S.withdrawStatus = "error";
      S.withdrawMessage = data.message || "Transfer failed.";
    }
  }catch(e){
    S.withdrawStatus = "error";
    S.withdrawMessage = "Could not reach the backend at " + BACKEND_URL + ". Is it running?";
  }
  render();
}

function cssSafe(str){ return str.replace(/[^a-zA-Z0-9]/g,""); }

/* ---------------- PAYSTACK ---------------- */
function payWithPaystack(){
  const emailInput = document.getElementById("pay-email");
  const email = (emailInput && emailInput.value) || S.riderEmail;
  const amountKobo = Math.round(S.finalFare * 100);

  if(typeof PaystackPop === "undefined" || PAYSTACK_PUBLIC_KEY.includes("REPLACE")){
    // fallback demo path — no real key configured
    S.screen = "rider-processing";
    render();
    setTimeout(()=>{ S.screen = "rider-paid"; render(); }, 1300);
    return;
  }

  const handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: email,
    amount: amountKobo,
    currency: "NGN",
    ref: "KPAKPA-" + Date.now(),
    callback: function(response){
      // Don't just trust the popup — confirm with the backend (which checks with Paystack directly).
      S.screen = "rider-processing";
      render();
      fetch(BACKEND_URL + "/api/payments/verify/" + encodeURIComponent(response.reference))
        .then(r=>r.json())
        .then(data=>{
          S.screen = data.status ? "rider-paid" : "rider-completed";
          if(!data.status) alert("We couldn't confirm that payment yet — please try again.");
          render();
        })
        .catch(()=>{
          // Backend not reachable — fall back so the demo still flows.
          S.screen = "rider-paid";
          render();
        });
    },
    onClose: function(){
      // user closed the popup without paying — stay on completed screen
    }
  });
  handler.openIframe();
}

/* ---------------- SCREENS ---------------- */
const SCREENS = {

  "role": ()=>`
    <h1 class="screen-title">Where are you<br>riding today?</h1>
    <p class="sub">Same haggle-for-your-fare energy as inDrive — just for the back of a bike.</p>
    <div class="role-grid">
      <div class="role-card" data-action="choose-role" data-role="rider">
        <div class="role-icon">🧍</div>
        <div><h3>I need a ride</h3><p>Set your price, pick your rider</p></div>
      </div>
      <div class="role-card" data-action="choose-role" data-role="biker">
        <div class="role-icon">🏍️</div>
        <div><h3>I'm a biker</h3><p>Go online, accept jobs, earn</p></div>
      </div>
    </div>
    <div class="banner-note">DEMO PROTOTYPE — negotiation &amp; matching are simulated client-side. Payment uses Paystack Inline; see chat for what's needed to go live.</div>
  `,

  "rider-setup": ()=>{
    if(S.distanceKm===null){
      S.distanceKm = +(rand(2,9)).toFixed(1);
      S.suggestedFare = Math.round((S.distanceKm*180)/10)*10;
      S.riderOffer = Math.round((S.suggestedFare*0.85)/10)*10;
    }
    return `
    <h1 class="screen-title">Book a bike</h1>
    <p class="sub">Estimated ${S.distanceKm} km · suggested fare ${fmt(S.suggestedFare)}</p>
    <label>Pickup</label>
    <input type="text" id="in-pickup" value="${S.pickup}">
    <label>Drop-off</label>
    <input type="text" id="in-dropoff" value="${S.dropoff}">
    <label>Your offer</label>
    <div class="fare-input-wrap">
      <span class="fare-prefix">₦</span>
      <input type="number" id="in-offer" value="${S.riderOffer}">
    </div>
    <button class="btn btn-primary" data-action="find-bike">Find a bike →</button>
  `;
  },

  "rider-searching": ()=>`
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="sub" style="margin-top:18px; text-align:center;">Sending your offer of <b style="color:var(--hazard)">${fmt(S.riderOffer)}</b> to nearby bikers…</p>
    </div>
  `,

  "rider-negotiating": ()=>`
    <h1 class="screen-title">Bikers responded</h1>
    <p class="sub">Accept a price, or counter and haggle a little.</p>
    ${S.responses.map(r=>`
      <div class="card">
        <div class="biker-row">
          <div class="avatar">${r.initial}</div>
          <div>
            <div class="biker-name">${r.name}</div>
            <div class="biker-meta">${r.bike} · ★ ${r.rating}</div>
          </div>
          <div>
            <div class="offer-price">${fmt(r.price)}</div>
            <div class="offer-status">${r.status === "accepted" ? "will take your offer" : "countered"}</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-small" data-action="accept-biker" data-name="${r.name}">Accept ${fmt(r.price)}</button>
        </div>
        <div class="btn-row">
          <input type="number" id="counter-${cssSafe(r.name)}" placeholder="Counter offer ₦" style="flex:1;">
          <button class="btn btn-ghost btn-small" data-action="counter-biker" data-name="${r.name}">Counter</button>
        </div>
      </div>
    `).join("")}
  `,

  "rider-matched": ()=>`
    <h1 class="screen-title">Matched! 🏍️</h1>
    <div class="card">
      <div class="biker-row">
        <div class="avatar">${S.matchedBiker.initial}</div>
        <div>
          <div class="biker-name">${S.matchedBiker.name}</div>
          <div class="biker-meta">${S.matchedBiker.bike} · ★ ${S.matchedBiker.rating}</div>
        </div>
        <div class="offer-price">${fmt(S.finalFare)}</div>
      </div>
    </div>
    <p class="sub"><span class="pulse-dot"></span>Biker is heading to ${S.pickup}</p>
    <button class="btn btn-primary" data-action="start-ride">Start ride</button>
  `,

  "rider-riding": ()=>`
    <h1 class="screen-title">On the way</h1>
    <p class="sub">${S.pickup} → ${S.dropoff}</p>
    <div class="progress-track"><div class="progress-fill" style="width:${S.rideProgress}%"></div></div>
    <p class="sub" style="font-family:'IBM Plex Mono',monospace;">${Math.round(S.rideProgress)}% of trip complete</p>
  `,

  "rider-completed": ()=>`
    <h1 class="screen-title">You've arrived</h1>
    <p class="sub">Trip complete. Time to settle up with ${S.matchedBiker.name}.</p>
    <div class="card">
      <div class="biker-meta">TRIP FARE</div>
      <div class="wallet-balance" style="font-size:28px;">${fmt(S.finalFare)}</div>
    </div>
    <label>Email for receipt</label>
    <input type="email" id="pay-email" value="${S.riderEmail}">
    <button class="btn btn-primary" data-action="pay-fare">Pay ${fmt(S.finalFare)} with Paystack</button>
    <div class="banner-note">Uses Paystack Inline (public key only). If no live key is configured, this falls back to a simulated payment so you can still demo the flow.</div>
  `,

  "rider-processing": ()=>`
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="sub" style="margin-top:18px;">Processing payment (demo mode)…</p>
    </div>
  `,

  "rider-paid": ()=>`
    <h1 class="screen-title">Paid ✓</h1>
    <div class="receipt">
      <div class="receipt-title">KPAKPA RECEIPT</div>
      <div class="receipt-row"><span>Rider</span><span>You</span></div>
      <div class="receipt-row"><span>Biker</span><span>${S.matchedBiker.name}</span></div>
      <div class="receipt-row"><span>Route</span><span>${S.pickup} → ${S.dropoff}</span></div>
      <div class="receipt-row"><span>Distance</span><span>${S.distanceKm} km</span></div>
      <div class="receipt-row total"><span>Total paid</span><span>${fmt(S.finalFare)}</span></div>
    </div>
    <button class="btn btn-ghost" data-action="back-to-role">Done</button>
  `,

  /* ---------------- BIKER SCREENS ---------------- */

  "biker-home": ()=>`
    <h1 class="screen-title">Biker dashboard</h1>
    <div class="toggle-row">
      <div>
        <div style="font-weight:600; font-size:14px;">${S.online ? "You're online" : "You're offline"}</div>
        <div class="biker-meta">${S.online ? "Watching for ride requests" : "Go online to receive jobs"}</div>
      </div>
      <div class="switch ${S.online?'on':''}" data-action="toggle-online"><div class="knob"></div></div>
    </div>

    <div class="card">
      <div class="biker-meta">WALLET BALANCE</div>
      <div class="wallet-balance">${fmt(S.wallet)}</div>
      <div class="biker-meta" style="margin-top:6px;">${S.tripsToday} trip(s) completed today</div>
      <button class="btn btn-ghost btn-small" style="margin-top:12px;" data-action="withdraw">Withdraw to bank</button>
    </div>

    ${S.incomingRequest ? renderIncoming() : S.online ? `
      <div class="empty-state"><div class="spinner" style="margin:0 auto 14px;"></div>Listening for nearby riders…</div>
    ` : `<div class="empty-state">Go online to start receiving ride requests.</div>`}
  `,

  "biker-active": ()=>`
    <h1 class="screen-title">Ride in progress</h1>
    <div class="card">
      <div class="biker-row">
        <div class="avatar">${S.activeRide.riderName[0]}</div>
        <div>
          <div class="biker-name">${S.activeRide.riderName}</div>
          <div class="biker-meta">${S.activeRide.pickup} → ${S.activeRide.dropoff}</div>
        </div>
        <div class="offer-price">${fmt(S.activeRide.finalFare)}</div>
      </div>
    </div>
    <p class="sub"><span class="pulse-dot"></span>Riding · ${S.activeRide.distanceKm} km</p>
    <button class="btn btn-primary" data-action="complete-delivery">Mark ride complete</button>
  `,

  "biker-withdraw": ()=>{
    if(S.withdrawStatus === "success"){
      return `
        <h1 class="screen-title">Sent ✓</h1>
        <div class="card"><p class="sub" style="margin:0;">Your payout has been initiated to your bank account. It may take a few minutes to land.</p></div>
        <button class="btn btn-ghost" data-action="reset">Back to dashboard</button>
      `;
    }
    return `
    <h1 class="screen-title">Withdraw funds</h1>
    <div class="card">
      <div class="biker-meta">AVAILABLE BALANCE</div>
      <div class="wallet-balance">${fmt(S.wallet)}</div>
    </div>

    <label>Bank</label>
    <select id="wd-bank" style="width:100%; background:var(--asphalt-3); border:1px solid var(--graphite-dark); border-radius:8px; padding:12px; color:var(--ink); font-family:'Inter',sans-serif; font-size:14px;">
      ${S.banksLoading ? `<option>Loading banks…</option>` :
        S.banks.length ? S.banks.map(b=>`<option value="${b.code}">${b.name}</option>`).join("") :
        `<option value="">Could not load banks — is the backend running?</option>`}
    </select>

    <label>Account number</label>
    <input type="text" id="wd-account" placeholder="0123456789" inputmode="numeric">

    <button class="btn btn-ghost" data-action="resolve-account" ${S.resolving ? "disabled" : ""}>
      ${S.resolving ? "Checking…" : "Verify account name"}
    </button>

    ${S.resolvedAccountName ? `<div class="banner-note" style="border-color:var(--good); color:var(--ink);">✓ ${S.resolvedAccountName}</div>` : ""}
    ${S.resolveError ? `<div class="banner-note" style="border-color:var(--ember); color:var(--ember);">${S.resolveError}</div>` : ""}

    <button class="btn btn-primary" data-action="submit-withdraw" ${!S.resolvedAccountName || S.withdrawStatus==="processing" ? "disabled" : ""}>
      ${S.withdrawStatus === "processing" ? "Sending…" : `Send ${fmt(S.wallet)} to bank`}
    </button>

    ${S.withdrawStatus === "error" ? `<div class="banner-note" style="border-color:var(--ember); color:var(--ember);">${S.withdrawMessage}</div>` : ""}

    <div class="banner-note">Real Paystack Transfer — needs the backend running with your secret key. In Paystack test mode, disable "Require OTP for test transfers" in your dashboard settings so this can complete without an OTP step.</div>
    <button class="btn btn-ghost" data-action="reset">Cancel</button>
  `;
  },
};

function renderIncoming(){
  const r = S.incomingRequest;
  if(r.status === "waiting"){
    return `<div class="card"><p class="sub" style="margin:0;"><span class="pulse-dot"></span>Waiting on rider's response to your counter…</p></div>`;
  }
  return `
    <div class="card">
      <div class="biker-meta">${r.status === "pending" ? "NEW RIDE REQUEST" : "RIDER COUNTERED"}</div>
      <div class="biker-row" style="margin-top:8px;">
        <div class="avatar">${r.riderName[0]}</div>
        <div>
          <div class="biker-name">${r.riderName}</div>
          <div class="biker-meta">${r.pickup} → ${r.dropoff} · ${r.distanceKm} km</div>
        </div>
        <div class="offer-price">${fmt(r.price)}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary btn-small" data-action="accept-request">Accept</button>
        <button class="btn btn-ember btn-small" data-action="decline-request">Decline</button>
      </div>
      <div class="btn-row">
        <input type="number" id="biker-counter-input" placeholder="Your counter ₦" style="flex:1;">
        <button class="btn btn-ghost btn-small" data-action="counter-request">Counter</button>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
